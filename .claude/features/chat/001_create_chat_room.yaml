# Feature Specification: 1:1 채팅방 생성
# Status: Draft
# Last Updated: 2026-04-18

meta:
  id: FEAT-CHAT-001
  title: 1:1 채팅방 생성
  type: Feature
  author: Claude

overview:
  summary: >
    특정 유저와 즉시 1:1 채팅방을 생성하며, 동일 두 유저 간 중복 생성을 방지하고 기존 방을 재사용한다.
  user_story: >
    As a 로그인 유저, I want to 특정 유저와 바로 1:1 채팅방을 생성하고 싶다,
    so that 별도 요청/수락 절차 없이 즉시 대화를 시작할 수 있다.
  goals:
    - 1:1 채팅방 즉시 생성 (요청/수락 절차 없음)
    - 동일 두 유저 간 중복 채팅방 방지 (idempotent)
    - 단체 채팅 확장을 고려한 참여자 기반 구조 설계
    - 동시성 안전 보장 (Unique Key + Exception Catch 전략)

# ──────────────────────────────────────────────
# DB 설계
# ──────────────────────────────────────────────
database_design:
  overview: >
    채팅방은 room_type(DIRECT/GROUP)으로 확장성을 확보하고,
    1:1 채팅방의 중복 방지는 direct_room_key UNIQUE INDEX로 처리한다.
    참여자 구조(chat_room_participant)를 통해 단체 채팅 확장 시 참여자 추가만 하면 된다.

  entities:
    chat_room:
      table: chat_room
      description: 채팅방 메타 정보
      fields:
        - name: id
          type: BIGINT
          constraint: PK, AUTO_INCREMENT
        - name: created_by
          type: BIGINT
          constraint: NOT NULL, FK -> user.id
          note: 채팅방 최초 생성자
        - name: room_type
          type: ENUM('DIRECT', 'GROUP')
          constraint: NOT NULL, DEFAULT 'DIRECT'
          note: DIRECT=1:1, GROUP=단체 (추후 확장)
        - name: status
          type: ENUM('OPEN', 'CLOSED')
          constraint: NOT NULL, DEFAULT 'OPEN'
          note: CLOSED = 비활성화(탈퇴/차단 등)
        - name: direct_room_key
          type: VARCHAR(50)
          constraint: "UNIQUE, NULLABLE (1:1 전용, GROUP은 NULL)"
          note: "format: DM_{min_user_id}_{max_user_id} — 중복 방지 idempotency key"
        - name: created_at
          type: DATETIME
          constraint: NOT NULL
        - name: updated_at
          type: DATETIME
          constraint: NOT NULL
        - name: deleted
          type: TINYINT(1)
          constraint: NOT NULL, DEFAULT 0
        - name: deleted_at
          type: DATETIME
          constraint: NULLABLE

      indexes:
        - name: UQ_chat_room_direct_key
          columns: [ direct_room_key ]
          type: UNIQUE
          note: "1:1 채팅방 중복 방지 핵심 제약. NULL은 UNIQUE 제외됨(GROUP 공존 가능)"
        - name: IDX_chat_room_created_by
          columns: [ created_by ]
          type: INDEX

    chat_room_participant:
      table: chat_room_participant
      description: 채팅방 참여자 (1:1=2명, GROUP=N명 확장 가능)
      fields:
        - name: id
          type: BIGINT
          constraint: PK, AUTO_INCREMENT
        - name: room_id
          type: BIGINT
          constraint: NOT NULL, FK -> chat_room.id
        - name: user_id
          type: BIGINT
          constraint: NOT NULL, FK -> user.id
        - name: last_read_message_id
          type: BIGINT
          constraint: NULLABLE, FK -> chat.id
          note: 읽음 처리용 (현재는 저장 구조만 확보, 기능은 추후)
        - name: created_at
          type: DATETIME
          constraint: NOT NULL
        - name: updated_at
          type: DATETIME
          constraint: NOT NULL
        - name: deleted
          type: TINYINT(1)
          constraint: NOT NULL, DEFAULT 0
        - name: deleted_at
          type: DATETIME
          constraint: NULLABLE

      indexes:
        - name: UQ_participant_room_user
          columns: [ room_id, user_id ]
          type: UNIQUE
          note: 동일 방에 동일 유저 중복 참여 방지
        - name: IDX_participant_user_id
          columns: [ user_id ]
          type: INDEX
          note: "특정 유저의 참여 채팅방 목록 조회 시 사용 (추후 '내 채팅방 목록' API)"

    chat:
      table: chat
      description: 채팅 메시지 (현재 구조만 확보, 송수신 기능은 추후)
      note: 현재 스펙 범위 외. ERD 구조 그대로 유지.
      fields:
        - name: id
          type: BIGINT
          constraint: PK, AUTO_INCREMENT
        - name: sender_id
          type: BIGINT
          constraint: NOT NULL, FK -> user.id
        - name: room_id
          type: BIGINT
          constraint: NOT NULL, FK -> chat_room.id
        - name: content
          type: TEXT
          constraint: NOT NULL
        - name: created_at
          type: DATETIME
          constraint: NOT NULL

      indexes:
        - name: IDX_chat_room_id_created_at
          columns: [ room_id, created_at ]
          type: INDEX
          note: 채팅방 메시지 페이지네이션 조회 시 사용 (추후)

  direct_room_key_strategy:
    format: "DM_{min(userId, targetUserId)}_{max(userId, targetUserId)}"
    example: "사용자 A(id=5), 사용자 B(id=12) -> DM_5_12"
    reason: >
      두 유저 ID를 정렬하여 조합하면 요청 방향(A→B, B→A)에 관계없이 동일 key 생성.
      UNIQUE INDEX와 결합하여 중복 방 생성을 DB 수준에서 차단.

  concurrency_strategy:
    problem: >
      A→B, B→A가 동시에 채팅방 생성 요청 시 direct_room_key 조회 시점에는
      둘 다 "없음"으로 판단 → 동시 INSERT 시도 발생 가능
    solution: Unique Key + DataIntegrityViolationException Catch 패턴
    flow:
      step1: "findByDirectRoomKey(key) → 존재하면 즉시 반환 (Happy Path)"
      step2: "없으면 ChatRoom + Participants INSERT 시도"
      step3: "DataIntegrityViolationException 발생 시 → 재조회 후 반환"
    note: >
      Pessimistic Lock은 처리량을 과도하게 제한. 이 패턴으로 충분하며
      실패 케이스는 극히 드물다 (자연어 중복 요청 타이밍이 ms 단위로 겹칠 때만).

  n_plus_1_strategy:
    issue: "ChatRoom 조회 시 participants 목록 로딩"
    solution:
      - "단건 조회(채팅방 생성 응답): JOIN FETCH 또는 @EntityGraph로 participants 함께 로딩"
      - "목록 조회(추후): participants는 별도 batch 조회 (BatchSize 또는 in-query)"

# ──────────────────────────────────────────────
# API 설계
# ──────────────────────────────────────────────
technical_spec:
  api:
    method: POST
    path: /api/v1/chat-rooms
    summary: 1:1 채팅방 생성 (이미 존재하면 기존 방 반환)
    auth: AUTHENTICATED (JWT)
    http_status:
      created: 201 (신규 생성)
      existing: 200 (기존 방 반환)
      note: >
        두 케이스를 단일 엔드포인트에서 처리.
        응답 코드로 신규/기존 구분 가능 (ChatRoomResponseCode 활용)
    request:
      dto: CreateChatRoomRequest
      fields:
        - name: targetUserId
          type: Long
          required: true
          validation: "NotNull, 자기 자신 불가"
    response:
      dto: ChatRoomResponse
      wrapper: CommonResponse<ChatRoomResponse>
      fields:
        - name: roomId
          type: Long
        - name: roomType
          type: String
          note: "DIRECT | GROUP"
        - name: isNewRoom
          type: boolean
          note: 신규 생성 여부 (클라이언트가 알림/분기 처리 시 활용)
        - name: participants
          type: List<ParticipantResponse>
          note: "참여자 목록 (userId, profileImage)"
        - name: createdAt
          type: String
          note: ISO-8601

  data_flow:
    - step: 1
      layer: Presentation
      component: ChatRoomController
      action: >
        @PostMapping("/chat-rooms"),
        @Valid CreateChatRoomRequest 수신,
        currentUserId(@AuthUser) 추출 → ChatRoomUseCase.createDirectRoom() 호출

    - step: 2
      layer: UseCase
      component: ChatRoomUseCase
      transaction: "@Transactional (write override)"
      action: |
        1. targetUser 존재 확인 (UserService.getById)
        2. directRoomKey = ChatRoom.generateDirectKey(currentUserId, targetUserId)
        3. ChatRoomService.findByDirectRoomKey(directRoomKey) → 존재하면 return (isNewRoom=false)
        4. 없으면 ChatRoomService.createDirectRoom(currentUser, targetUser) → INSERT
        5. DataIntegrityViolationException catch → 재조회 후 return (isNewRoom=false)
        6. ChatRoomResponse.from(room, isNewRoom) 반환

    - step: 3
      layer: Domain
      component: ChatRoom (Entity)
      action: |
        - ChatRoom.createDirect(createdBy, directRoomKey): static factory method
        - ChatRoom.generateDirectKey(userId1, userId2): static utility
          → "DM_" + min(id1,id2) + "_" + max(id1,id2)
        - ChatRoomParticipant.create(room, user): static factory method

    - step: 4
      layer: Domain
      component: ChatRoomService
      action: |
        - findByDirectRoomKey(key): Optional<ChatRoom>
        - createDirectRoom(creator, target):
            chatRoom = ChatRoom.createDirect(creator, key)
            participants = [ChatRoomParticipant.create(room, creator),
                            ChatRoomParticipant.create(room, target)]
            chatRoomRepository.save(chatRoom)
            chatRoomParticipantRepository.saveAll(participants)

    - step: 5
      layer: Infrastructure
      component: ChatRoomRepository, ChatRoomParticipantRepository
      action: |
        - findByDirectRoomKey: JPQL with JOIN FETCH participants
          (N+1 방지)
        - save(chatRoom), saveAll(participants)

  validation_rules:
    - "targetUserId는 NotNull이어야 한다"
    - "targetUserId는 currentUserId와 달라야 한다 (자기 자신과 채팅 불가)"
    - "targetUser가 존재하지 않으면 예외 (USER_NOT_FOUND)"
    - "동일 두 유저 간 1:1 채팅방은 1개만 존재한다 (direct_room_key UNIQUE)"

  error_codes:
    domain: chat
    range: "406xx"
    codes:
      - code: 40601
        name: CANNOT_CHAT_WITH_SELF
        message: "자기 자신과 채팅방을 생성할 수 없습니다."
        http: 400
      - code: 40602
        name: CHAT_ROOM_NOT_FOUND
        message: "채팅방을 찾을 수 없습니다."
        http: 404

# ──────────────────────────────────────────────
# 엔티티 구현 스케치
# ──────────────────────────────────────────────
entity_sketch:
  ChatRoom:
    package: com.project.bangjjack.domain.chat.domain.entity
    annotations: [ "@Entity", "@Getter", "@NoArgsConstructor(PROTECTED)", "@AllArgsConstructor(PRIVATE)", "@Table(uniqueConstraints=@UniqueConstraint(columnNames='direct_room_key'))" ]
    fields:
      - "Long id (BaseEntity)"
      - "Long createdBy — @Column(nullable=false)"
      - "RoomType roomType — @Enumerated(STRING)"
      - "RoomStatus status — @Enumerated(STRING)"
      - "String directRoomKey — @Column(length=50, unique=true)"
      - "@OneToMany(mappedBy='room', cascade=ALL, orphanRemoval=true) List<ChatRoomParticipant> participants"
    static_methods:
      - "createDirect(Long createdBy, String directRoomKey): ChatRoom"
      - "generateDirectKey(Long userId1, Long userId2): String"
    domain_methods:
      - "close(): void — status = CLOSED"

  ChatRoomParticipant:
    package: com.project.bangjjack.domain.chat.domain.entity
    annotations: [ "@Entity", "@Getter", "@NoArgsConstructor(PROTECTED)", "@AllArgsConstructor(PRIVATE)", "@Table(uniqueConstraints=@UniqueConstraint(columnNames={'room_id','user_id'}))" ]
    fields:
      - "Long id (BaseEntity)"
      - "@ManyToOne(fetch=LAZY) ChatRoom room"
      - "Long userId — @Column(nullable=false)"
      - "Long lastReadMessageId — @Column(nullable=true)"
    static_methods:
      - "create(ChatRoom room, Long userId): ChatRoomParticipant"

# ──────────────────────────────────────────────
# 테스트 전략
# ──────────────────────────────────────────────
testing_strategy:
  happy_path:
    - "신규 1:1 채팅방 생성 성공 → 201, 채팅방 + 참여자 2명 저장 확인"
    - "동일 두 유저 재요청 → 200, 기존 방 반환 (DB 행 추가 없음)"
    - "A→B 생성 후 B→A 재요청 → 동일 roomId 반환 (key 대칭성 검증)"

  edge_cases:
    - "targetUserId = currentUserId → 40601 CANNOT_CHAT_WITH_SELF"
    - "targetUserId 미존재 → 40301 USER_NOT_FOUND (user 도메인 에러)"
    - "동시 요청 시뮬레이션 → DataIntegrityViolationException catch 후 기존 방 반환"

  unit_test_targets:
    - "ChatRoom.generateDirectKey: id 순서 무관하게 동일 key 생성 검증"
    - "ChatRoomUseCase: 신규/기존 분기 로직 (Mock ChatRoomService)"
    - "ChatRoomService.createDirectRoom: saveAll 1회 호출, 참여자 2명 생성 검증"

# ──────────────────────────────────────────────
# 확장성 노트 (단체 채팅)
# ──────────────────────────────────────────────
extensibility:
  group_chat:
    changes_needed:
      - "room_type = GROUP, direct_room_key = NULL"
      - "ChatRoom에 name 필드 추가 (단체방 이름)"
      - "ChatRoomParticipant.create()는 동일 메서드 재사용"
      - "참여자 추가: ChatRoomParticipantRepository.saveAll() 확장"
    no_changes:
      - "채팅방 참여자 구조 (이미 N명 지원)"
      - "chat 테이블 구조"
      - "ChatRoomResponse (participants 리스트 구조 그대로)"
