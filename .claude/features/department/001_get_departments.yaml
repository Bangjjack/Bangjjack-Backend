# Feature Specification: 학과 목록 조회
# Status: Draft
# Last Updated: 2026-04-14

meta:
  id: FEAT-004
  title: 학과 목록 조회 (캠퍼스별 필터링)
  type: Feature
  author: 1winhyun

overview:
  summary: >
    온보딩 화면에서 사용자가 학과를 선택할 수 있도록 캠퍼스별 학과 목록을 조회하는 API.
  user_story: >
    As a 온보딩 중인 사용자, I want to 내 캠퍼스에 해당하는 학과 목록을 드롭다운으로 선택하고 싶다,
    so that 정확한 학과 정보를 입력할 수 있다.
  goals:
    - 캠퍼스(GLOBAL_CAMPUS / MEDICAL_CAMPUS) 기준으로 학과 목록 필터링
    - 온보딩 드롭다운 UI에서 사용 (departmentId 선택 후 온보딩 요청에 포함)

# ============================================================
# API 명세
# ============================================================
technical_spec:
  api:
    - method: GET
      path: /api/v1/departments
      summary: 학과 목록 조회 (캠퍼스 필터 필수)
      auth: MEMBER (JWT)
      request:
        query_params:
          - name: campus
            type: String (Enum)
            required: true
            validation: "GLOBAL_CAMPUS | MEDICAL_CAMPUS"
      response:
        dto: DepartmentResponse
        http_status: 200 OK
        wrapper: CommonResponse<List<DepartmentResponse>>
        fields:
          - name: departmentId
            type: Long
          - name: campus
            type: String (Enum)
          - name: name
            type: String

  data_flow:
    - step: 1
      layer: Presentation (DepartmentController)
      action: campus 쿼리 파라미터 수신, DepartmentUseCase.getDepartmentsByCampus(campus) 호출
    - step: 2
      layer: UseCase (DepartmentUseCase)
      action: DepartmentGetService.findAllByCampus(campus)로 학과 목록 조회
    - step: 3
      layer: Domain (DepartmentGetService)
      action: DepartmentRepository.findAllByCampusAndDeletedFalse(campus) 호출
    - step: 4
      layer: Infrastructure (DepartmentRepository)
      action: campus 인덱스 활용하여 departments 테이블 조회
    - step: 5
      layer: Response DTO
      action: List<DepartmentResponse>.from(departments)으로 departmentId, name, campus 반환

  database:
    entities:
      - name: Department
        table: departments
        action: Read
        fields: "id, name, campus (WHERE campus = ? AND deleted = false)"

  error_codes:
    domain_range: "403xx (Department 도메인)"
    codes:
      - code: 40301
        name: INVALID_CAMPUS
        status: 400 BAD_REQUEST
        message: "유효하지 않은 캠퍼스 값입니다."
        trigger: "campus 파라미터가 GLOBAL_CAMPUS / MEDICAL_CAMPUS 외의 값인 경우"

  validation_rules:
    - "campus 파라미터는 필수. 누락 시 400 Bad Request"
    - "campus 값은 GLOBAL_CAMPUS | MEDICAL_CAMPUS 중 하나여야 함"
    - "deleted = false인 학과만 반환"

# ============================================================
# 테스트 전략
# ============================================================
testing_strategy:
  happy_path:
    - "campus=GLOBAL_CAMPUS 조회 시 글로벌 캠퍼스 학과 목록만 반환"
    - "campus=MEDICAL_CAMPUS 조회 시 메디컬 캠퍼스 학과 목록만 반환"
    - "deleted=true인 학과는 목록에 포함되지 않음"
  edge_cases:
    - "campus 파라미터 누락 시 400 Bad Request"
    - "campus=INVALID 등 허용되지 않는 값 → 400 INVALID_CAMPUS"
    - "해당 캠퍼스에 학과가 0개일 경우 빈 배열([]) 반환"

# ============================================================
# 주의사항
# ============================================================
notes:
  - "학과 데이터는 초기 데이터(data.sql 또는 Flyway migration)로 사전 삽입 필요"
  - "온보딩 흐름: 캠퍼스 선택(Step 2) → GET /api/v1/departments?campus={campus} → 드롭다운 렌더링 → departmentId 선택"
