# User Entity
# Last Updated: 2026-04-11

entity: USER
description: 서비스 사용자 정보를 관리합니다
table: USER
domain: User

columns:
  - id:
      type: BIGINT
      nullable: false
      pk: true
      description: PK (Auto-Increment)
  - username:
      type: VARCHAR(50)
      nullable: false
      unique: true
      description: 사용자 닉네임 (서비스 내 표시 이름)
  - email:
      type: VARCHAR(255)
      nullable: false
      unique: true
      description: 사용자 이메일 주소 (로그인 식별자)
  - gender:
      type: VARCHAR(10)
      nullable: false
      enum: Gender
      description: 사용자 성별 (MALE, FEMALE, OTHER)
  - age:
      type: INT
      nullable: false
      description: 사용자 나이
  - profile_image:
      type: VARCHAR(512)
      nullable: true
      description: 프로필 이미지 URL
  - is_deleted:
      type: BOOLEAN
      nullable: false
      default: false
      description: 소프트 삭제 여부
  - created_at:
      type: DATETIME
      nullable: false
      description: 생성 일시
  - updated_at:
      type: DATETIME
      nullable: false
      description: 최종 수정 일시
  - deleted_at:
      type: DATETIME
      nullable: true
      description: 소프트 삭제 일시

relationships: []

business_logic:
  - create(): 신규 사용자 생성 (정적 팩토리 메서드)
  - updateProfile(): 프로필 정보 수정 (username, profileImage)
  - softDelete(): 소프트 삭제 처리 (isDeleted = true, deletedAt = now)
