# User Entity
# Last Updated: 2026-04-14

entity: USER
description: 서비스 사용자 정보를 관리합니다
table: users
domain: User
extends: BaseEntity  # → references/data-model/base/base-entity.yaml

columns:
  - provider_id:
      type: VARCHAR(255)
      nullable: false
      unique: true
      description: Google OAuth2 고유 사용자 ID (sub 값). 회원 식별 및 중복 가입 방지에 사용.
  - username:
      type: VARCHAR(50)
      nullable: false
      description: 사용자 닉네임 (Google name 기반 자동 설정)
  - email:
      type: VARCHAR(255)
      nullable: false
      unique: true
      description: 사용자 이메일 주소 (@gachon.ac.kr 도메인만 허용)
  - gender:
      type: VARCHAR(10)
      nullable: true
      enum: Gender
      enum_values: [ MALE, FEMALE ]
      description: 사용자 성별. 온보딩 시 설정. OTHER 제거 (UI 기준 남성/여성).
  - birth_year:
      type: INT
      nullable: true
      description: 출생년도 (e.g. 2000). 온보딩 시 설정. 기존 age 컬럼 대체.
  - grade:
      type: INT
      nullable: true
      description: 학년 (1 ~ 4). 온보딩 시 설정.
  - campus:
      type: VARCHAR(30)
      nullable: true
      enum: Campus
      enum_values: [ GLOBAL_CAMPUS, MEDICAL_CAMPUS ]
      description: 캠퍼스 (글로벌 캠퍼스 / 메디컬 캠퍼스). 온보딩 시 설정.
  - department_id:
      type: BIGINT
      nullable: true
      fk: departments.id
      description: 학과 FK. 온보딩 시 설정. (departments 테이블 참조)
  - semester:
      type: VARCHAR(20)
      nullable: true
      enum: Semester
      enum_values: [ SIXTEEN_WEEKS, TWENTY_FIVE_WEEKS ]
      description: 학기 유형 (16주 / 25주). 온보딩 시 설정.
  - dormitory:
      type: VARCHAR(10)
      nullable: true
      enum: Dormitory
      enum_values: [ DORM_1, DORM_2, DORM_3 ]
      description: 기숙사 (1기숙사 / 2기숙사 / 3기숙사). 온보딩 시 설정.
  - is_onboarded:
      type: BOOLEAN
      nullable: false
      default: false
      description: 온보딩 완료 여부. 온보딩 API 호출 완료 시 true로 변경.
  - is_checklist_registered:
      type: BOOLEAN
      nullable: false
      default: false
      description: 생활습관 체크리스트 등록 완료 여부. 체크리스트 등록 API 호출 완료 시 true로 변경.
  - profile_image:
      type: VARCHAR(512)
      nullable: true
      description: 프로필 이미지 URL (Google picture 값)

removed_columns:
  - age:
      reason: "birth_year로 대체. Google OAuth2 미제공으로 항상 null이었으므로 마이그레이션 영향 없음."
  - department (VARCHAR):
      reason: "별도 departments 테이블로 관리. department_id FK로 대체."

relationships:
  - type: ManyToOne
    target: Department
    fk: department_id
    fetch: LAZY
    nullable: true
    description: "사용자 소속 학과. 온보딩 시 설정."

business_logic:
  - "create(providerId, username, email, profileImage): 신규 사용자 생성 (정적 팩토리 메서드). gender/birth_year/grade/campus/department/semester/dormitory는 null로 초기화. isOnboarded = false."
  - "completeOnboarding(birthYear, grade, gender, campus, department, semester, dormitory): 온보딩 정보 일괄 설정 + isOnboarded = true. isOnboarded = true이면 AlreadyOnboardedException 발생."
  - "completeChecklistRegistration(): 체크리스트 등록 완료 플래그 설정 + isChecklistRegistered = true. isChecklistRegistered = true이면 AlreadyChecklistRegisteredException 발생."
  - "updateProfile(username, profileImage): 프로필 정보 수정"
  - "softDelete(): → BaseEntity 위임"

enums:
  Gender:
    values: [ MALE, FEMALE ]
    note: "기존 OTHER 제거. 온보딩 UI 기준(남성/여성)으로 단순화."
  Campus:
    values: [ GLOBAL_CAMPUS, MEDICAL_CAMPUS ]
    display: { GLOBAL_CAMPUS: "글로벌 캠퍼스", MEDICAL_CAMPUS: "메디컬 캠퍼스" }
  Semester:
    values: [ SIXTEEN_WEEKS, TWENTY_FIVE_WEEKS ]
    display: { SIXTEEN_WEEKS: "16주", TWENTY_FIVE_WEEKS: "25주" }
  Dormitory:
    values: [ DORM_1, DORM_2, DORM_3 ]
    display: { DORM_1: "1기숙사", DORM_2: "2기숙사", DORM_3: "3기숙사" }
