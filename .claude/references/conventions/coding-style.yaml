# Coding Style Guide
# Last Updated: 2026-04-09

meta:
  title: Coding Style Guide
  type: Convention
  scope: Project-wide coding standards

java_style:
  general:
    - rule: Prefer final fields
      description: Immutability first — declare fields final where possible
    - rule: No field injection
      description: Use constructor injection only
    - rule: Explicit null handling
      description: Use @NonNull/@Nullable annotations, Optional where appropriate
    - rule: Records for DTOs
      description: Use Java records for simple immutable DTOs; POJOs with final fields otherwise
    - rule: Static factory methods
      description: Use static `from(entity)` instead of direct constructor calls for Response DTOs

  naming:
    classes: PascalCase (e.g., BoothService)
    methods: camelCase (e.g., findBoothById)
    variables: camelCase
    constants: UPPER_SNAKE_CASE (e.g., MAX_BOOTH_CAPACITY)
    packages: lowercase (no underscores)

architecture:
  package_structure:
    pattern: Domain-Driven Design
    format: com.project.bangjjack.domain.{domain_name}.{layer}.*
    layers:
      domain/entity: Entity classes
      domain/repository: Repository interfaces
      domain/service: Domain services (complex logic only)
      application/usecase: "{Domain}UseCase.java — Single Facade (e.g., PostUseCase.java)"
      application/dto/request: Request DTOs
      application/dto/response: Response DTOs
      application/exception: Domain-specific ErrorCode enums
      presentation: Controllers
      presentation/response: ResponseCode enums
    example:
      - com.project.bangjjack.domain.post.domain.entity.Post
      - com.project.bangjjack.domain.post.domain.repository.PostRepository
      - com.project.bangjjack.domain.post.application.usecase.CreatePostUseCase
      - com.project.bangjjack.domain.post.application.dto.request.CreatePostRequest
      - com.project.bangjjack.domain.post.application.dto.response.PostResponse
      - com.project.bangjjack.domain.post.application.exception.PostErrorCode
      - com.project.bangjjack.domain.post.presentation.PostController
      - com.project.bangjjack.domain.post.presentation.response.PostResponseCode
    global: com.project.bangjjack.global.* for common components

  dependency_injection:
    do: "@RequiredArgsConstructor (Lombok) — MUST use on all @Service, @RestController classes"
    dont: Field Injection (@Autowired), manual constructor injection

spring_boot:
  transaction:
    usecase:
      class_level: "@Transactional(readOnly = true) — MUST apply to all UseCase classes"
      write_method: "@Transactional — override on individual write methods (create/update/delete)"
    service:
      note: "Domain Service does NOT manage transactions — transaction boundary is UseCase only"

  controller:
    annotation: "@RestController"
    response: CommonResponse<T> wrapper
    dto: Record or POJO for all Request/Response

  response_handling:
    success:
      method: CommonResponse.success(ResponseCodeInterface, data)
      enum: Define in {Domain}ResponseCode Enum (implement ResponseCodeInterface)
      code_value: MUST use standard HTTP Status Codes (200, 201)
      forbidden: NEVER use domain-specific error code ranges for success codes
    error:
      method: throw ApplicationException(ErrorCodeInterface)
      enum: Define in ErrorCode Enum
    interface: All codes MUST implement ResponseCodeInterface or ErrorCodeInterface

  entity:
    base: All entities MUST extend BaseEntity (createdAt, updatedAt, deleted, deletedAt)
    id_strategy: Auto-Increment Long (@GeneratedValue(strategy = GenerationType.IDENTITY))
    lombok:
      required: "@Getter — MUST apply to all Entity classes"
      required2: "@NoArgsConstructor(access = AccessLevel.PROTECTED) — MUST apply to all Entity classes"
      required3: "@AllArgsConstructor(access = AccessLevel.PRIVATE) — MUST apply to all Entity classes"
      forbidden: "@Setter — MUST NOT use (state changes via static factory method or domain methods only)"
      note: "UseCase/Service/Controller use @RequiredArgsConstructor for DI"
    soft_delete:
      method: softDelete()
      rule: Never perform physical delete
    constraints: Use JPA relationship annotations (@ManyToOne, @OneToMany, @ManyToMany) with FK constraints

error_handling:
  global:
    annotation: "@RestControllerAdvice"
    response: CommonResponse with 5-digit status codes
  code_ranges:
    success: 2xxxx
    client_error: 4xxxx
    server_error: 5xxxx

testing:
  framework:
    runner: JUnit 5
    style: unit tests with mocks
    mocking: Mockito
  practices:
    unit: "@ExtendWith(MockitoExtension.class)"
    assertions: AssertJ (assertThat)

best_practices:
  - rule: Immutability first
    description: Prefer final fields and unmodifiable collections (List.of, Map.of)
  - rule: Static factory methods
    description: Use static from() for DTO conversion to keep constructors clean
  - rule: Fail fast
    description: Validate inputs early using Jakarta Validation or preconditions
  - rule: Single responsibility
    description: Keep methods short and focused on one task
